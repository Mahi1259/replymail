spring.application.name=gmail-reply-assistant
server.port=${PORT:8080}

gemini.api.key=${GEMINI_API_KEY:}
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent
gemini.api.timeout-ms=25000

app.cors.allowed-origin-patterns=chrome-extension://*,moz-extension://*,http://localhost:*,https://mail.google.com

logging.level.com.gmailassistant=INFO
